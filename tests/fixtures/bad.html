<!doctype html>
<html>
<head>
  <title>Fagun Test Fixture</title>
  <meta name="viewport" content="width=device-width, user-scalable=no">
  <style>
    .low { color: #bbb; background: #ccc; }  /* low contrast on purpose */
    body { background: #fff; }
    .wide { width: 150vw; height: 1px; }
    .clipped { width: 40px; height: 16px; overflow: hidden; white-space: nowrap; }
    .tiny { width: 10px; height: 10px; padding: 0; }
  </style>
</head>
<body>
  <!-- a11y problems: img without alt, input without label, empty button,
       no <h1>, duplicate id, positive tabindex, target=_blank no rel,
       low-contrast text, viewport blocks zoom -->
  <img src="logo.png">
  <p class="low">Hard to read low-contrast paragraph text here.</p>

  <div id="dup">one</div>
  <div id="dup">two</div>

  <button></button>
  <a href="https://example.com" target="_blank">external</a>
  <span tabindex="5">focus trap</span>
  <div class="wide"></div>
  <p class="clipped">This text is intentionally clipped.</p>
  <button class="tiny" aria-label="tiny target"></button>

  <form method="get" action="http://insecure.example/login">
    <input type="text" name="username">
    <input type="password" name="password">
    <input type="email" name="email">
    <button type="submit">Go</button>
  </form>
</body>
</html>
